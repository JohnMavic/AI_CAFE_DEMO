<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooling Plant</title>
    <style>
        /* ── Reset & Base ─────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary:    #0a0e17;
            --bg-secondary:  #111827;
            --bg-card:       #1a1f2e;
            --neon-cyan:     #00f0ff;
            --neon-blue:     #3b82f6;
            --neon-magenta:  #f72585;
            --neon-green:    #39ff14;
            --neon-orange:   #ff6b2b;
            --text-primary:  #e2e8f0;
            --text-secondary:#94a3b8;
            --border-color:  rgba(0, 240, 255, 0.15);
            --glow-cyan:     0 0 15px rgba(0, 240, 255, 0.4), 0 0 30px rgba(0, 240, 255, 0.1);
            --glow-magenta:  0 0 15px rgba(247, 37, 133, 0.4), 0 0 30px rgba(247, 37, 133, 0.1);
            --side-margin:   25%;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated Background Grid ─────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top Navigation Bar ───────────────────────────── */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem clamp(16px, 2vw, 48px);
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--glow-cyan);
        }

        .navbar-brand .icon {
            width: 28px;
            height: 28px;
            border: 2px solid var(--neon-cyan);
            border-radius: 6px;
            display: grid;
            place-items: center;
            font-size: 0.85rem;
            box-shadow: var(--glow-cyan);
        }

        .navbar-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* ── Neon Toggle Switch ────────────────────────────── */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toggle-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggle {
            position: relative;
            width: 48px;
            height: 26px;
            cursor: pointer;
        }

        .toggle input {
            display: none;
        }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 13px;
            transition: all 0.3s ease;
        }

        .toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: all 0.3s ease;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.4);
        }

        .toggle input:checked ~ .toggle-track {
            border-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        .toggle input:checked ~ .toggle-thumb {
            left: 25px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* ── Neon Buttons ─────────────────────────────────── */
        .btn {
            padding: 0.5rem 1.2rem;
            border: 1px solid;
            border-radius: 6px;
            background: transparent;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-cyan {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

        .btn-cyan:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        .btn-magenta {
            color: var(--neon-magenta);
            border-color: var(--neon-magenta);
        }

        .btn-magenta:hover {
            background: rgba(247, 37, 133, 0.1);
            box-shadow: var(--glow-magenta);
        }

        /* ── Main Content ─────────────────────────────────── */
        .main-content {
            position: relative;
            z-index: 1;
            padding: 2rem var(--side-margin);
        }

        /* ── Slide Section ────────────────────────────────── */
        .slide {
            width: 100%;
            max-width: 100%;
        }

        .slide-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .slide-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            position: relative;
            display: inline-block;
        }

        .slide-title::after {
            content: '';
            display: block;
            margin: 0.75rem auto 0;
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            box-shadow: 0 0 8px var(--neon-cyan);
        }

        .slide-subtitle {
            margin-top: 0.75rem;
            font-size: clamp(0.85rem, 1.5vw, 1.1rem);
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── Image Container ──────────────────────────────── */
        .image-container {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-card);
            box-shadow:
                0 0 30px rgba(0, 240, 255, 0.05),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .image-container::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 12px;
            padding: 1px;
            background: linear-gradient(135deg, var(--neon-cyan), transparent 40%, transparent 60%, var(--neon-blue));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 2;
        }

        .image-container img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 11px;
        }

        /* ── Image Wrapper (for SVG overlay) ──────────────── */
        .image-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
        }

        /* ── Flow Overlay ─────────────────────────────────── */
        .flow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .flow-overlay.edit-active {
            pointer-events: auto;
            cursor: crosshair;
        }

        .flow-overlay.edit-active.delete-mode {
            cursor: not-allowed;
        }

        .vertex-group { cursor: grab; }

        .vertex-delete-icon {
            display: none;
            fill: #ff3355;
            font-size: 18px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            filter: drop-shadow(0 0 3px rgba(255,50,80,0.9));
        }

        .flow-overlay.edit-active.delete-mode .vertex-group {
            cursor: pointer;
        }

        .flow-overlay.edit-active.delete-mode .vertex-group:hover .vertex-delete-icon {
            display: block;
        }

        .flow-overlay.edit-active.delete-mode .vertex-group:hover .vertex {
            fill: rgba(255, 50, 80, 0.3) !important;
            stroke: #ff3355 !important;
            filter: drop-shadow(0 0 8px rgba(255,50,80,0.8));
        }

        /* ── SVG Pipe Elements ────────────────────────────── */
        .pipe-glow {
            fill: none;
            stroke-width: 16;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.5;
        }

        .pipe-segment {
            fill: none;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 8 16;
            opacity: 0.5;
        }

        .pipe-segment.active {
            opacity: 1;
            filter: drop-shadow(0 0 4px currentColor);
        }

        .pipe-edit-line {
            stroke: rgba(0, 220, 255, 0.35);
            stroke-width: 3;
            stroke-linecap: round;
        }

        .pipe-edit-line.selected {
            stroke-width: 4;
            filter: drop-shadow(0 0 4px rgba(0, 220, 255, 0.5));
        }

        .vertex {
            fill: var(--bg-primary);
            stroke: var(--neon-cyan);
            stroke-width: 2;
            cursor: grab;
        }

        .vertex:hover { fill: rgba(0, 240, 255, 0.25); }

        .vertex.selected {
            filter: drop-shadow(0 0 5px rgba(0, 240, 255, 0.8));
        }

        .color-stop-marker {
            stroke: #fff;
            stroke-width: 1.5;
            opacity: 0.9;
        }

        .direction-arrow {
            fill: var(--neon-cyan);
            font-size: 16px;
            dominant-baseline: central;
            text-anchor: middle;
            opacity: 0.8;
        }

        /* ── Edit Toolbar ─────────────────────────────────── */
        .edit-toolbar {
            display: none;
            flex-wrap: wrap;
            gap: 0.6rem 1rem;
            padding: 0.8rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            align-items: center;
        }

        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding-right: 1rem;
            border-right: 1px solid rgba(255,255,255,0.07);
        }

        .toolbar-section:last-child { border-right: none; padding-right: 0; }

        .toolbar-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .tool-btn {
            padding: 0.3rem 0.7rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }

        .tool-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }

        .tool-btn.active {
            background: rgba(0, 240, 255, 0.12);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 6px rgba(0, 240, 255, 0.15);
        }

        .tool-btn.danger:hover { border-color: var(--neon-magenta); color: var(--neon-magenta); }

        .tool-select, .tool-input {
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.72rem;
            font-family: inherit;
        }

        .tool-input { width: 55px; text-align: center; }

        .color-stops-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .color-stop-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.15rem 0.45rem;
            border: 1px solid;
            border-radius: 10px;
            font-size: 0.68rem;
            color: var(--text-primary);
        }

        .chip-remove {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0;
            line-height: 1;
        }

        .chip-remove:hover { color: var(--neon-magenta); }

        .toolbar-hint {
            font-size: 0.68rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* ── Pump Toggle in Status Bar ────────────────────── */
        .pump-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pump-control .toggle-label {
            font-size: 0.8rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .pump-control .toggle-label.on {
            color: var(--neon-green);
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.5);
        }

        .pump-control .toggle-label.off {
            color: var(--neon-magenta);
        }

        /* ── Status Bar (bottom of image) ─────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: linear-gradient(180deg, rgba(26, 31, 46, 0.8), var(--bg-card));
            border-top: 1px solid var(--border-color);
        }

        .status-group {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .status-dot.green {
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
        }

        .status-dot.cyan {
            background: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
        }

        .status-dot.orange {
            background: var(--neon-orange);
            box-shadow: 0 0 8px var(--neon-orange);
        }

        .status-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .status-label {
            color: var(--text-secondary);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        /* ── Footer ───────────────────────────────────────── */
        .footer {
            text-align: center;
            padding: 1.5rem var(--side-margin);
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        /* ── Responsive ───────────────────────────────────── */
        @media (max-width: 768px) {
            .navbar {
                flex-wrap: wrap;
                gap: 0.75rem;
            }

            .status-bar {
                justify-content: center;
            }

            .status-group {
                justify-content: center;
            }

            .btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .navbar-controls {
                width: 100%;
                justify-content: space-between;
            }

            .status-item {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="icon">❄</div>
            <span>Cooling Plant Monitor</span>
        </div>
        <div class="navbar-controls">

    <!-- Main Content -->
    <main class="main-content">
        <section class="slide" id="slide-1">

            <!-- Title -->
            <div class="slide-header">

            <!-- Edit Toolbar (visible in edit mode) -->
            <div class="edit-toolbar" id="editToolbar">

                    <button class="tool-btn danger" id="btnDeletePoint">⌫ Delete Pt</button>
                </div>
                <div class="toolbar-section">
                    <span class="toolbar-label">Dir:</span>
                    <button class="tool-btn" id="btnDirection"><span id="directionLabel">→ Forward</span></button>
                </div>
                <div class="toolbar-section" style="border-right:none">
                    <span class="toolbar-label">Draw:</span>
                    <button class="tool-btn active" id="btnColorBlue" style="color:#00d4ff;border-color:#00d4ff">● Blue</button>

                </div>

            <!-- Image -->
            <div class="image-container">
                <div class="image-wrapper">
                    <img src="Images/ChatGPT Image Mar 12, 2026, 03_00_43 PM.png" alt="Cooling Plant – Seawater Cooling System Diagram">

                    <!-- SVG Flow Overlay (dynamically rendered) -->
                    <svg class="flow-overlay" id="flowOverlay" viewBox="0 0 1057 617" preserveAspectRatio="xMidYMid meet"></svg>
                </div>

                <!-- Status Bar -->
                <div class="status-bar">
                    <div class="status-group">
                        <div class="pump-control">
                            <label class="toggle">
                                <input type="checkbox" id="seawaterPumpToggle">
                                <span class="toggle-track"></span>
                                <span class="toggle-thumb"></span>

                        <div class="status-item">
                            <span class="status-dot orange"></span>
                            <span class="status-value">92%</span>
                            <span class="status-label">Efficiency</span>
                        </div>
                    </div>
                    <div class="status-group">
                        <span class="status-label" id="timestamp"></span>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        COOLING PLANT MONITORING DASHBOARD &nbsp;·&nbsp; VANILLA JS &nbsp;·&nbsp; 2026
    </footer>

    <!-- Vanilla JS — Pipe Editor & Flow Animation -->
    <script>
    (function () {
        'use strict';

        // ── Constants ─────────────────────────────────────
        const VB_W = 1057, VB_H = 617;
        const STORAGE_KEY = 'coolingPlantPipelines';
        const NS = 'http://www.w3.org/2000/svg';
        const COLORS = {
            blue: { stroke: '#00d4ff', glow: 'rgba(0,180,255,0.25)' },
            red:  { stroke: '#ff3355', glow: 'rgba(255,50,80,0.25)' }
        };

        // ── State ─────────────────────────────────────────
        let pipelines = [];
        let mode = 'present';
        let editTool = 'extend';
        let drawColor = 'blue';
        let selectedIdx = -1;
        let dragInfo = null;
        let flowActive = false;
        let animFrame = null;
        let animOffset = 0;
        let lastDeletedPipe = null;

        // ── DOM ───────────────────────────────────────────
        const svg        = document.getElementById('flowOverlay');
        const toolbar    = document.getElementById('editToolbar');
        const pipeSelect = document.getElementById('pipeSelect');
        const modeBtn    = document.getElementById('btnModeToggle');
        const pumpToggle = document.getElementById('seawaterPumpToggle');
        const pumpLabel  = document.getElementById('pumpStatusLabel');
        const dirLabel   = document.getElementById('directionLabel');

        // ── Persistence ───────────────────────────────────
        function load() {
            try {
                const d = localStorage.getItem(STORAGE_KEY);
                if (d) pipelines = JSON.parse(d);
            } catch(e) { pipelines = []; }
            // Migrate old format: add color to points if missing
            pipelines.forEach(pipe => {
                pipe.points = pipe.points.map(p => ({ x: p.x, y: p.y, color: p.color || 'blue' }));
                delete pipe.colorStops;
            });
            // Fix duplicate names
            const seen = {};
            pipelines.forEach(pipe => {
                if (seen[pipe.name]) {
                    const usedNums = pipelines.map(p => { const m = p.name.match(/^Pipe (\d+)$/); return m ? parseInt(m[1]) : 0; });
                    let n = 1; while (usedNums.includes(n)) n++;
                    pipe.name = 'Pipe ' + n;
                }
                seen[pipe.name] = true;
            });
        }
        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(pipelines)); }

        // ── Coordinate Helpers ────────────────────────────
        function pctToVB(p) { return { x: p.x * VB_W / 100, y: p.y * VB_H / 100 }; }
        function mouseToPct(e) {
            const pt = svg.createSVGPoint();
            pt.x = e.clientX;
            pt.y = e.clientY;
            const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
            return { x: svgPt.x / VB_W * 100, y: svgPt.y / VB_H * 100 };
        }

        // ── Geometry ──────────────────────────────────────
        function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
        function polyLen(pts) { let l = 0; for (let i = 1; i < pts.length; i++) l += dist(pts[i-1], pts[i]); return l; }

        function distToSegment(p, a, b) {
            const dx = b.x - a.x, dy = b.y - a.y;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return dist(p, a);
            const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / lenSq));
            return dist(p, { x: a.x + t * dx, y: a.y + t * dy });
        }

        // Find best insert index for a new point in draw mode
        function findInsertIndex(pipe, clickPct) {
            const pts = pipe.points;
            if (pts.length < 2) return pts.length;
            const click = pctToVB(clickPct);
            const vb = pts.map(pctToVB);

            // Find nearest segment
            let minDist = Infinity, nearSeg = -1;
            for (let i = 0; i < vb.length - 1; i++) {
                const d = distToSegment(click, vb[i], vb[i + 1]);
                if (d < minDist) { minDist = d; nearSeg = i; }
            }

            // Close to a segment? Insert between its endpoints
            if (minDist < 20) return nearSeg + 1;

            // Far away: append near start or end
            return dist(click, vb[0]) < dist(click, vb[vb.length - 1]) ? 0 : pts.length;
        }

        function ptAtDist(pts, target) {
            let acc = 0;
            for (let i = 0; i < pts.length - 1; i++) {
                const d = dist(pts[i], pts[i+1]);
                if (acc + d >= target) {
                    const t = (target - acc) / d;
                    return { x: pts[i].x + (pts[i+1].x - pts[i].x) * t, y: pts[i].y + (pts[i+1].y - pts[i].y) * t };
                }
                acc += d;
            }
            return { ...pts[pts.length - 1] };
        }

        // ── Per-Edge Segments (color per vertex) ──────────
        function getSegments(pipe) {
            const pts = pipe.points;
            if (pts.length < 2) return [];
            const segments = [];
            let lenBefore = 0;
            for (let i = 0; i < pts.length - 1; i++) {
                const a = pctToVB(pts[i]), b = pctToVB(pts[i+1]);
                const segLen = dist(a, b);
                segments.push({
                    points: [a, b],
                    colorStart: pts[i].color || 'blue',
                    colorEnd: pts[i+1].color || 'blue',
                    lenBefore, length: segLen, index: i
                });
                lenBefore += segLen;
            }
            return segments;
        }

        // ── SVG Helpers ───────────────────────────────────
        function svgEl(tag, attrs) {
            const el = document.createElementNS(NS, tag);
            for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
            return el;
        }
        function fmt(n) { return n.toFixed(1); }

        // ── Render ────────────────────────────────────────
        let gradCounter = 0;
        function render() {
            svg.innerHTML = '';
            gradCounter = 0;

            // Shared <defs> for gradients
            const defs = svgEl('defs', {});
            svg.appendChild(defs);

            pipelines.forEach((pipe, pi) => {
                if (pipe.points.length < 1) return;
                const g = svgEl('g', { 'data-pipe': pi });

                if (mode === 'present') {
                    if (pipe.points.length < 2) return;
                    const segs = getSegments(pipe);
                    segs.forEach((seg, si) => {
                        const [a, b] = seg.points;
                        const isMixed = seg.colorStart !== seg.colorEnd;
                        let strokeVal, glowVal;

                        if (isMixed) {
                            // Create gradient for this segment
                            const gid = 'g' + (gradCounter++);
                            const grad = svgEl('linearGradient', {
                                id: gid, gradientUnits: 'userSpaceOnUse',
                                x1: fmt(a.x), y1: fmt(a.y), x2: fmt(b.x), y2: fmt(b.y)
                            });
                            grad.appendChild(svgEl('stop', { offset: '0%', 'stop-color': COLORS[seg.colorStart].stroke }));
                            grad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': COLORS[seg.colorEnd].stroke }));
                            defs.appendChild(grad);
                            strokeVal = `url(#${gid})`;

                            const ggid = 'gg' + gradCounter;
                            const ggrad = svgEl('linearGradient', {
                                id: ggid, gradientUnits: 'userSpaceOnUse',
                                x1: fmt(a.x), y1: fmt(a.y), x2: fmt(b.x), y2: fmt(b.y)
                            });
                            ggrad.appendChild(svgEl('stop', { offset: '0%', 'stop-color': COLORS[seg.colorStart].glow }));
                            ggrad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': COLORS[seg.colorEnd].glow }));
                            defs.appendChild(ggrad);
                            glowVal = `url(#${ggid})`;
                        } else {
                            strokeVal = COLORS[seg.colorStart].stroke;
                            glowVal = COLORS[seg.colorStart].glow;
                        }

                        // Glow
                        g.appendChild(svgEl('polyline', {
                            class: 'pipe-glow',
                            points: `${fmt(a.x)},${fmt(a.y)} ${fmt(b.x)},${fmt(b.y)}`,
                            style: `stroke:${glowVal}`
                        }));
                        // Segment
                        g.appendChild(svgEl('polyline', {
                            class: 'pipe-segment' + (flowActive ? ' active' : ''),
                            points: `${fmt(a.x)},${fmt(a.y)} ${fmt(b.x)},${fmt(b.y)}`,
                            style: `stroke:${strokeVal}`,
                            'data-len-before': seg.lenBefore,
                            'data-direction': pipe.direction
                        }));
                    });
                } else {
                    // ── Edit mode ──
                    const vb = pipe.points.map(pctToVB);
                    const isSel = pi === selectedIdx;

                    // Draw each segment with its colors
                    if (vb.length >= 2) {
                        for (let i = 0; i < vb.length - 1; i++) {
                            const a = vb[i], b = vb[i+1];
                            const cA = pipe.points[i].color || 'blue';
                            const cB = pipe.points[i+1].color || 'blue';
                            let stroke;
                            if (cA === cB) {
                                stroke = COLORS[cA].stroke;
                            } else {
                                const gid = 'eg' + (gradCounter++);
                                const grad = svgEl('linearGradient', {
                                    id: gid, gradientUnits: 'userSpaceOnUse',
                                    x1: fmt(a.x), y1: fmt(a.y), x2: fmt(b.x), y2: fmt(b.y)
                                });
                                grad.appendChild(svgEl('stop', { offset: '0%', 'stop-color': COLORS[cA].stroke }));
                                grad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': COLORS[cB].stroke }));
                                defs.appendChild(grad);
                                stroke = `url(#${gid})`;
                            }
                            g.appendChild(svgEl('line', {
                                class: 'pipe-edit-line' + (isSel ? ' selected' : ''),
                                x1: fmt(a.x), y1: fmt(a.y), x2: fmt(b.x), y2: fmt(b.y),
                                style: `stroke:${stroke}`
                            }));
                        }

                        // Direction arrow
                        if (isSel) {
                            const total = polyLen(vb);
                            const mid = ptAtDist(vb, total / 2);
                            const ahead = ptAtDist(vb, total / 2 + 8 * pipe.direction);
                            const angle = Math.atan2(ahead.y - mid.y, ahead.x - mid.x) * 180 / Math.PI;
                            const arr = svgEl('text', {
                                x: fmt(mid.x), y: fmt(mid.y),
                                class: 'direction-arrow',
                                transform: `rotate(${angle.toFixed(1)},${fmt(mid.x)},${fmt(mid.y)})`
                            });
                            arr.textContent = '▶';
                            g.appendChild(arr);
                        }
                    }

                    // Vertices (colored, grouped with delete icon & tooltip)
                    if (isSel) {
                        vb.forEach((p, ptIdx) => {
                            const c = pipe.points[ptIdx].color || 'blue';
                            const vg = svgEl('g', { class: 'vertex-group' });

                            const circle = svgEl('circle', {
                                class: 'vertex selected', cx: fmt(p.x), cy: fmt(p.y), r: 6,
                                'data-pipe': pi, 'data-point': ptIdx,
                                style: `fill:${COLORS[c].stroke}; stroke:#fff`
                            });
                            const title = document.createElementNS(NS, 'title');
                            title.textContent = `Point ${ptIdx + 1} (${c})\nDouble-click: toggle color\nRight-click: delete point`;
                            circle.appendChild(title);
                            vg.appendChild(circle);

                            // × icon (visible on hover in delete mode)
                            vg.appendChild(svgEl('text', {
                                class: 'vertex-delete-icon',
                                x: fmt(p.x), y: fmt(p.y - 0.5)
                            })).textContent = '×';

                            g.appendChild(vg);
                        });
                    }
                }
                svg.appendChild(g);
            });
        }

        // ── Flow Animation ────────────────────────────────
        function startFlow() {
            if (animFrame) return;
            (function tick() {
                animOffset -= 0.8;
                svg.querySelectorAll('.pipe-segment.active').forEach(el => {
                    const lb = parseFloat(el.dataset.lenBefore) || 0;
                    const dir = parseInt(el.dataset.direction) || 1;
                    el.style.strokeDashoffset = lb + animOffset * dir;
                });
                animFrame = requestAnimationFrame(tick);
            })();
        }

        function stopFlow() {
            if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
        }

        // ── UI Updates ────────────────────────────────────
        function refreshPipeSelect() {
            pipeSelect.innerHTML = '';
            if (!pipelines.length) {
                pipeSelect.add(new Option('(No pipes)', '-1'));
                selectedIdx = -1;
            } else {
                pipelines.forEach((p, i) => {
                    const o = new Option(p.name, i);
                    if (i === selectedIdx) o.selected = true;
                    pipeSelect.add(o);
                });
            }
            refreshPipeUI();
        }

        function refreshPipeUI() {
            const pipe = pipelines[selectedIdx];
            dirLabel.textContent = pipe ? (pipe.direction === 1 ? '→ Forward' : '← Reverse') : '—';
        }

        function setMode(m) {
            mode = m;
            modeBtn.textContent = m === 'edit' ? '▶ Done — Present' : '✏ Edit Pipes';
            modeBtn.className = 'btn ' + (m === 'edit' ? 'btn-magenta' : 'btn-cyan');
            toolbar.style.display = m === 'edit' ? 'flex' : 'none';
            svg.classList.toggle('edit-active', m === 'edit');
            if (m === 'present' && flowActive) { render(); startFlow(); }
            else { stopFlow(); render(); }
        }

        function updateToolBtns() {
            document.getElementById('btnDrawMode').classList.toggle('active', editTool === 'draw');
            document.getElementById('btnExtendMode').classList.toggle('active', editTool === 'extend');
            document.getElementById('btnSelectMode').classList.toggle('active', editTool === 'select');
            document.getElementById('btnDeletePoint').classList.toggle('active', editTool === 'delete');
            svg.classList.toggle('delete-mode', editTool === 'delete');
        }

        function updateColorBtns() {
            document.getElementById('btnColorBlue').classList.toggle('active', drawColor === 'blue');
            document.getElementById('btnColorRed').classList.toggle('active', drawColor === 'red');
        }

        // ── Edit Handlers ─────────────────────────────────
        svg.addEventListener('mousedown', function(e) {
            if (mode !== 'edit') return;
            const t = e.target;
            if (t.classList.contains('vertex')) {
                const pi = parseInt(t.dataset.pipe), ptI = parseInt(t.dataset.point);
                dragInfo = { pi, ptI, moved: false };
                selectedIdx = pi;
                pipeSelect.value = pi;
                refreshPipeUI();
                e.preventDefault();
            }
        });

        svg.addEventListener('mousemove', function(e) {
            if (!dragInfo) return;
            const pct = mouseToPct(e);
            dragInfo.moved = true;
            // Preserve color when dragging
            const pt = pipelines[dragInfo.pi].points[dragInfo.ptI];
            pt.x = pct.x;
            pt.y = pct.y;
            render();
        });

        window.addEventListener('mouseup', function() {
            if (dragInfo) {
                if (dragInfo.moved) save();
                dragInfo = null;
            }
        });

        svg.addEventListener('click', function(e) {
            if (mode !== 'edit' || dragInfo) return;
            if (e.target.classList.contains('vertex')) {
                if (editTool === 'delete') {
                    const pi = parseInt(e.target.dataset.pipe), ptI = parseInt(e.target.dataset.point);
                    pipelines[pi].points.splice(ptI, 1);
                    save(); render();
                }
                return;
            }
            if (selectedIdx < 0) return;
            const pct = mouseToPct(e);
            const pipe = pipelines[selectedIdx];

            if (editTool === 'draw') {
                // Insert only ON an existing segment (within threshold)
                if (pipe.points.length < 2) return;
                const click = pctToVB(pct);
                const vb = pipe.points.map(pctToVB);
                let minD = Infinity, nearSeg = -1;
                for (let i = 0; i < vb.length - 1; i++) {
                    const d = distToSegment(click, vb[i], vb[i+1]);
                    if (d < minD) { minD = d; nearSeg = i; }
                }
                if (minD > 20) return; // too far from any segment → do nothing
                pipe.points.splice(nearSeg + 1, 0, { x: pct.x, y: pct.y, color: drawColor });
                save(); render();

            } else if (editTool === 'extend') {
                // Add at start or end, whichever is closer
                if (pipe.points.length === 0) {
                    pipe.points.push({ x: pct.x, y: pct.y, color: drawColor });
                } else {
                    const click = pctToVB(pct);
                    const first = pctToVB(pipe.points[0]);
                    const last = pctToVB(pipe.points[pipe.points.length - 1]);
                    if (dist(click, first) < dist(click, last)) {
                        pipe.points.unshift({ x: pct.x, y: pct.y, color: drawColor });
                    } else {
                        pipe.points.push({ x: pct.x, y: pct.y, color: drawColor });
                    }
                }
                save(); render();
            }
        });

        // Double-click vertex → toggle color
        svg.addEventListener('dblclick', function(e) {
            if (mode !== 'edit') return;
            if (e.target.classList.contains('vertex')) {
                const pi = parseInt(e.target.dataset.pipe);
                const ptI = parseInt(e.target.dataset.point);
                const pt = pipelines[pi].points[ptI];
                pt.color = pt.color === 'red' ? 'blue' : 'red';
                save(); render();
            }
        });

        svg.addEventListener('contextmenu', function(e) {
            if (mode !== 'edit') return;
            e.preventDefault();
            if (e.target.classList.contains('vertex')) {
                const pi = parseInt(e.target.dataset.pipe), ptI = parseInt(e.target.dataset.point);
                pipelines[pi].points.splice(ptI, 1);
                save(); render();
            }
        });

        // ── Toolbar Events ────────────────────────────────
        modeBtn.addEventListener('click', () => setMode(mode === 'edit' ? 'present' : 'edit'));

        pipeSelect.addEventListener('change', () => {
            selectedIdx = parseInt(pipeSelect.value);
            refreshPipeUI(); render();
        });

        document.getElementById('btnNewPipe').addEventListener('click', () => {
            const usedNums = pipelines.map(p => { const m = p.name.match(/^Pipe (\d+)$/); return m ? parseInt(m[1]) : 0; });
            let n = 1; while (usedNums.includes(n)) n++;
            pipelines.push({ id: 'p' + Date.now(), name: 'Pipe ' + n, points: [], direction: 1 });
            selectedIdx = pipelines.length - 1;
            editTool = 'extend'; updateToolBtns();
            save(); refreshPipeSelect(); render();
        });

        document.getElementById('btnDeletePipe').addEventListener('click', () => {
            if (selectedIdx < 0) return;
            lastDeletedPipe = { pipe: pipelines[selectedIdx], index: selectedIdx };
            pipelines.splice(selectedIdx, 1);
            selectedIdx = pipelines.length ? 0 : -1;
            document.getElementById('btnUndoDelete').style.display = 'inline-block';
            save(); refreshPipeSelect(); render();
        });

        document.getElementById('btnUndoDelete').addEventListener('click', () => {
            if (!lastDeletedPipe) return;
            const idx = Math.min(lastDeletedPipe.index, pipelines.length);
            pipelines.splice(idx, 0, lastDeletedPipe.pipe);
            selectedIdx = idx;
            lastDeletedPipe = null;
            document.getElementById('btnUndoDelete').style.display = 'none';
            save(); refreshPipeSelect(); render();
        });

        document.getElementById('btnDeletePoint').addEventListener('click', () => { editTool = 'delete'; updateToolBtns(); });

        document.getElementById('btnDrawMode').addEventListener('click', () => { editTool = 'draw'; updateToolBtns(); });
        document.getElementById('btnExtendMode').addEventListener('click', () => { editTool = 'extend'; updateToolBtns(); });
        document.getElementById('btnSelectMode').addEventListener('click', () => { editTool = 'select'; updateToolBtns(); });

        document.getElementById('btnDirection').addEventListener('click', () => {
            if (selectedIdx < 0) return;
            pipelines[selectedIdx].direction *= -1;
            save(); refreshPipeUI(); render();
        });

        // Draw color selection
        document.getElementById('btnColorBlue').addEventListener('click', () => { drawColor = 'blue'; updateColorBtns(); });
        document.getElementById('btnColorRed').addEventListener('click', () => { drawColor = 'red'; updateColorBtns(); });

        // ── Pump Toggle ───────────────────────────────────
        pumpToggle.addEventListener('change', function() {
            flowActive = this.checked;
            pumpLabel.textContent = flowActive ? 'Seawater Pumps ON' : 'Seawater Pumps OFF';
            pumpLabel.classList.toggle('on', flowActive);
            pumpLabel.classList.toggle('off', !flowActive);
            if (flowActive && mode === 'present') { render(); startFlow(); }
            else { stopFlow(); render(); }
        });

        // ── Navbar Buttons ────────────────────────────────
        document.getElementById('btnRefresh').addEventListener('click', function () {
            this.style.boxShadow = 'var(--glow-cyan)';
            this.textContent = '✓ Refreshed';
            setTimeout(() => { this.style.boxShadow = ''; this.textContent = '↻ Refresh'; }, 1200);
        });

        document.getElementById('btnAlerts').addEventListener('click', function () {
            this.style.boxShadow = 'var(--glow-magenta)';
            setTimeout(() => { this.style.boxShadow = ''; }, 600);
            alert(`${pipelines.length} pipe(s), ${pipelines.reduce((s,p) => s + p.points.length, 0)} vertices.\nNo active alerts.`);
        });

        // ── Timestamp ─────────────────────────────────────
        const tsEl = document.getElementById('timestamp');
        function tick() {
            tsEl.textContent = new Date().toLocaleString('de-DE', {
                day:'2-digit', month:'2-digit', year:'numeric',
                hour:'2-digit', minute:'2-digit', second:'2-digit'
            });
        }
        tick(); setInterval(tick, 1000);

        // ── Init ──────────────────────────────────────────
        load();
        if (pipelines.length) selectedIdx = 0;
        refreshPipeSelect();
        setMode('present');
    })();
    </script>
</body>
</html>
